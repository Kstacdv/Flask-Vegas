version: '3.8'

services:
  web:
    build: .
    container_name: casino_app
    restart: always
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: casino_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web