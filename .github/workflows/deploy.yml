name: Casino IoT - CI/CD to Azure

on:
  push:
    branches:
      - main  # Potok uruchomi się przy każdym pushu do gałęzi main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
        username: ${{ secrets.AZURE_ACR_USERNAME }}
        password: ${{ secrets.AZURE_ACR_PASSWORD }}

    # 3
    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/casino-iot:latest .
        docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/casino-iot:latest

    # 4
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/casino-iot:latest
