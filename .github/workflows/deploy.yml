name: Casino IoT - CI/CD to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie kodu
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Logowanie do ACR
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
        username: ${{ secrets.AZURE_ACR_USERNAME }}
        password: ${{ secrets.AZURE_ACR_PASSWORD }}

    # 3. Zbudowanie obrazu z unikalnym numerem ID commita
    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/casino-iot:${{ github.sha }} .
        docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/casino-iot:${{ github.sha }}

    # 4. Wdrożenie do App Service
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/casino-iot:${{ github.sha }}

    # 5. OSTATECZNY MŁOT: Wymuszenie twardego restartu kontenera
    - name: Trigger App Service Webhook
      env:
        WEBHOOK_URL: ${{ secrets.AZURE_WEBHOOK_URL }}
      run: curl -X POST "$WEBHOOK_URL"
